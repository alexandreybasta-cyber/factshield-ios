<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactShield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fs: {
              bg: '#FFFFFF',
              surface: '#F9FAFB',
              card: '#FFFFFF',
              text: '#1F2937',
              muted: '#6B7280',
              accent: '#F97316',
              'accent-hover': '#EA580C',
              border: '#E5E7EB',
              'border-light': '#F3F4F6',
              true: '#10B981',
              'sub-true': '#14B8A6',
              misleading: '#F59E0B',
              false: '#EF4444',
              unverifiable: '#9CA3AF',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif']
          },
          maxWidth: {
            panel: '400px'
          },
          boxShadow: {
            'card': '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            'card-hover': '0 4px 12px rgba(0,0,0,0.08)',
            'btn': '0 1px 2px rgba(249,115,22,0.2)',
            'btn-hover': '0 4px 12px rgba(249,115,22,0.3)',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-fs-bg text-fs-text font-sans min-h-screen max-w-panel mx-auto overflow-hidden">
  <div id="app" class="flex flex-col h-screen"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactShield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            fs: {
              bg: '#0F172A',
              card: '#1E293B',
              text: '#F8FAFC',
              muted: '#94A3B8',
              accent: '#3B82F6',
              border: '#334155',
              true: '#10B981',
              'sub-true': '#14B8A6',
              misleading: '#F59E0B',
              false: '#EF4444',
              unverifiable: '#6B7280',
            }
          },
          fontFamily: {
            sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif']
          },
          maxWidth: {
            panel: '400px'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-fs-bg text-fs-text font-sans min-h-screen max-w-panel mx-auto overflow-hidden">
  <div id="app" class="flex flex-col h-screen"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
