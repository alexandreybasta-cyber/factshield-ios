<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactShield Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            fs: {
              bg: '#0F172A',
              card: '#1E293B',
              text: '#F8FAFC',
              muted: '#94A3B8',
              accent: '#3B82F6',
              border: '#334155',
            }
          },
          fontFamily: {
            sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .toast-enter { animation: toast-in 0.3s ease-out forwards; }
    .toast-exit { animation: toast-out 0.3s ease-in forwards; }
    @keyframes toast-in { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes toast-out { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px; height: 16px;
      background: #3B82F6;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #1E293B;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      background: #334155;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-fs-bg text-fs-text font-sans min-h-screen">
  <div id="options-root" class="max-w-xl mx-auto px-6 py-8"></div>
  <script src="options.js"></script>
</body>
</html>
